name: PHP Composer

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.0'
            symfony: '5.4.*'
          - php: '8.1'
            symfony: '6.4.*'
          - php: '8.2'
            symfony: '7.3.*'
          - php: '8.4'
            symfony: '8.0.*'

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Validate composer.json
      run: composer validate

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}

    - name: Install dependencies for Symfony ${{ matrix.symfony }}
      run: composer update -W --prefer-dist --no-progress --no-interaction "symfony/console:${{ matrix.symfony }}" "friendsofphp/php-cs-fixer:^3.0"

    - name: Check style
      run: composer run-script check-style

    - name: Run test suite (Symfony ${{ matrix.symfony }})
      run: composer run-script test
